<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>iPad Clock</title>
  <style>
    :root {
      --bg-top: #07101a;
      --bg-mid: #13243a;
      --bg-bottom: #544943;
      --face-light: #fbfbfa;
      --face-mid: #eff1f4;
      --face-dark: #d9dde3;
      --ink: #182234;
      --muted: rgba(24, 34, 52, 0.4);
      --accent: #cf2941;
      --frame: rgba(255, 255, 255, 0.46);
      --clock-size: min(78vmin, calc(100vw - 48px), calc(100vh - 48px));
      --clock-translate-y: 0px;
      --digital-opacity: 1;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      background:
        radial-gradient(circle at 22% 18%, rgba(120, 154, 197, 0.16), transparent 26%),
        radial-gradient(circle at 78% 82%, rgba(211, 156, 106, 0.18), transparent 30%),
        linear-gradient(140deg, var(--bg-top) 0%, var(--bg-mid) 54%, var(--bg-bottom) 100%);
    }

    body {
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
    }

    .clock-shell {
      width: var(--clock-size);
      aspect-ratio: 1;
      border-radius: 50%;
      position: relative;
      display: grid;
      overflow: hidden;
      isolation: isolate;
      place-items: center;
      background:
        radial-gradient(circle at 32% 28%, rgba(255, 255, 255, 0.88), transparent 22%),
        linear-gradient(145deg, var(--face-light) 0%, var(--face-mid) 42%, var(--face-dark) 100%);
      border: min(1.05vmin, 10px) solid var(--frame);
      box-shadow:
        0 34px 65px rgba(3, 8, 18, 0.34),
        0 10px 24px rgba(14, 24, 40, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.96),
        inset 0 -8px 18px rgba(91, 102, 123, 0.14);
      transform: translateY(var(--clock-translate-y));
    }

    .clock-shell::before {
      content: "";
      position: absolute;
      inset: 3.6%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 26%, rgba(255, 255, 255, 0.42), transparent 36%);
      box-shadow:
        inset 0 0 0 1px rgba(83, 92, 110, 0.16),
        inset 0 0 20px rgba(255, 255, 255, 0.18);
    }

    .clock-shell::after {
      content: "";
      position: absolute;
      inset: 8.8%;
      z-index: 0;
      border-radius: 50%;
      box-shadow:
        inset 0 0 0 1px rgba(74, 85, 106, 0.08),
        0 0 0 1px rgba(255, 255, 255, 0.22);
    }

    .tick {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 1;
      border-radius: 999px;
      background: var(--tick-color);
      box-shadow: 0 0 0 0.5px rgba(255, 255, 255, 0.08);
    }

    .numeral {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 2;
      min-width: 2.6ch;
      text-align: center;
      font-family: "Avenir Next", "SF Pro Display", "Helvetica Neue", sans-serif;
      font-size: clamp(18px, 2.55vmin, 28px);
      font-variant-numeric: lining-nums;
      letter-spacing: 0.01em;
      line-height: 1.1;
      font-weight: 600;
      color: rgba(24, 34, 52, 0.72);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.46);
      transform: translate(-50%, -50%);
    }

    .numeral.quarter {
      font-size: clamp(21px, 3.1vmin, 34px);
      font-weight: 650;
      color: rgba(18, 28, 46, 0.9);
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      z-index: 3;
      transform-origin: 50% 100%;
      border-radius: 999px;
      overflow: visible;
    }

    .hand.hour {
      width: max(1.45vmin, 10px);
      height: 23%;
      margin-left: calc(max(1.45vmin, 10px) / -2);
      background: linear-gradient(180deg, rgba(45, 58, 86, 0.98), rgba(22, 30, 46, 0.98));
      clip-path: polygon(50% 0, 84% 12%, 66% 100%, 34% 100%, 16% 12%);
      box-shadow: 0 7px 14px rgba(12, 17, 30, 0.16);
    }

    .hand.minute {
      width: max(1vmin, 6px);
      height: 34%;
      margin-left: calc(max(1vmin, 6px) / -2);
      background: linear-gradient(180deg, rgba(77, 87, 107, 0.96), rgba(55, 63, 80, 0.96));
      clip-path: polygon(50% 0, 80% 10%, 62% 100%, 38% 100%, 20% 10%);
      box-shadow: 0 7px 14px rgba(12, 17, 30, 0.12);
    }

    .hand.second {
      width: 2px;
      height: 38%;
      margin-left: -1px;
      background: linear-gradient(180deg, #dd4158, #b0162d);
      box-shadow: 0 0 12px rgba(176, 22, 45, 0.12);
    }

    .hand.second::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -23%;
      width: 12px;
      height: 12px;
      transform: translateX(-50%);
      border-radius: 50%;
      border: 2px solid rgba(207, 41, 65, 0.96);
      background: rgba(251, 251, 250, 0.92);
    }

    .hand.second::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -30%;
      width: 2px;
      height: 28%;
      transform: translateX(-50%);
      border-radius: inherit;
      background: rgba(207, 41, 65, 0.95);
    }

    .center-cap {
      position: absolute;
      z-index: 4;
      width: 7.4%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #42506a 0%, #202a3d 56%, #121825 100%);
      box-shadow:
        0 3px 10px rgba(11, 16, 28, 0.2),
        0 0 0 2px rgba(255, 255, 255, 0.28);
    }

    .center-cap::after {
      content: "";
      position: absolute;
      inset: 35%;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(228, 232, 238, 0.96));
    }

    .digital {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 999px;
      color: rgba(243, 246, 251, 0.78);
      background: rgba(7, 12, 22, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px) saturate(120%);
      font-size: clamp(12px, 1.35vmin, 15px);
      letter-spacing: 0.14em;
      opacity: var(--digital-opacity);
      transition: opacity 160ms ease;
    }

    body.wallpaper-mode {
      padding: 0;
    }

    body.wallpaper-mode .digital {
      bottom: 18px;
      font-size: clamp(11px, 1.1vmin, 14px);
    }

    @media (orientation: portrait) {
      .clock-shell {
        width: min(var(--clock-size), calc(100vw - 40px), calc(100vh - 96px));
      }
    }
  </style>
</head>
<body>
  <main class="clock-shell" aria-label="模拟时钟">
    <div class="hand hour" id="hourHand"></div>
    <div class="hand minute" id="minuteHand"></div>
    <div class="hand second" id="secondHand"></div>
    <div class="center-cap"></div>
  </main>
  <div class="digital" id="digitalTime"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const root = document.documentElement;
    const body = document.body;
    const clock = document.querySelector('.clock-shell');
    const hourHand = document.getElementById('hourHand');
    const minuteHand = document.getElementById('minuteHand');
    const secondHand = document.getElementById('secondHand');
    const digitalTime = document.getElementById('digitalTime');
    let frameHandle = 0;
    const numerals = Array.from({ length: 12 }, (_, index) => index + 1);

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function applyWallpaperOptions() {
      const wallpaperMode = params.get('wallpaper') === '1';
      const showDigital = params.get('digital') !== '0';
      const scale = Number.parseFloat(params.get('scale') || '');
      const offsetY = Number.parseFloat(params.get('offsetY') || '');
      const normalizedScale = Number.isFinite(scale) ? clamp(scale, 50, 100) : wallpaperMode ? 68 : 78;
      const normalizedOffsetY = Number.isFinite(offsetY) ? clamp(offsetY, -240, 240) : wallpaperMode ? -16 : 0;

      body.classList.toggle('wallpaper-mode', wallpaperMode);
      root.style.setProperty('--clock-size', `min(${normalizedScale}vmin, calc(100vw - 48px), calc(100vh - 48px))`);
      root.style.setProperty('--clock-translate-y', `${normalizedOffsetY}px`);
      root.style.setProperty('--digital-opacity', showDigital ? '1' : '0');
      digitalTime.hidden = !showDigital;
    }

    function polarPoint(radius, angleDeg) {
      const angle = (angleDeg - 90) * Math.PI / 180;
      const center = clock.clientWidth / 2;

      return {
        x: center + Math.cos(angle) * radius,
        y: center + Math.sin(angle) * radius
      };
    }

    function buildDial() {
      clock.querySelectorAll('.tick, .numeral').forEach((node) => node.remove());

      const size = clock.clientWidth;
      const chapterOuterRadius = size * 0.418;
      const numeralRadius = size * 0.315;

      for (let i = 0; i < 60; i += 1) {
        const tick = document.createElement('div');
        const quarter = i % 15 === 0;
        const major = i % 5 === 0;
        const angleDeg = i * 6;
        const width = quarter ? Math.max(size * 0.012, 4.5) : major ? Math.max(size * 0.0075, 3) : Math.max(size * 0.0026, 1.4);
        const height = quarter ? size * 0.088 : major ? size * 0.06 : size * 0.042;
        const radius = chapterOuterRadius - height / 2;
        const point = polarPoint(radius, angleDeg);

        tick.className = 'tick';
        tick.style.width = `${width}px`;
        tick.style.height = `${height}px`;
        tick.style.left = `${point.x}px`;
        tick.style.top = `${point.y}px`;
        tick.style.setProperty('--tick-color', quarter ? 'rgba(22, 33, 53, 0.88)' : major ? 'rgba(34, 45, 66, 0.7)' : 'rgba(58, 67, 85, 0.26)');
        tick.style.transform = `translate(-50%, -50%) rotate(${angleDeg}deg)`;
        clock.appendChild(tick);
      }

      numerals.forEach((value) => {
        const numeral = document.createElement('div');
        const point = polarPoint(numeralRadius, value * 30);

        numeral.className = 'numeral';
        if (value % 3 === 0 || value === 12) {
          numeral.classList.add('quarter');
        }
        numeral.textContent = String(value);
        numeral.style.setProperty('--x', `${point.x}px`);
        numeral.style.setProperty('--y', `${point.y}px`);
        clock.appendChild(numeral);
      });
    }

    buildDial();
    window.addEventListener('resize', buildDial);
    applyWallpaperOptions();

    const formatter = new Intl.DateTimeFormat('zh-CN', {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false
    });

    function render() {
      const now = new Date();
      const ms = now.getMilliseconds();
      const seconds = now.getSeconds() + ms / 1000;
      const minutes = now.getMinutes() + seconds / 60;
      const hours = (now.getHours() % 12) + minutes / 60;

      hourHand.style.transform = `translateY(0) rotate(${hours * 30}deg)`;
      minuteHand.style.transform = `translateY(0) rotate(${minutes * 6}deg)`;
      secondHand.style.transform = `translateY(0) rotate(${seconds * 6}deg)`;
      digitalTime.textContent = formatter.format(now);

      frameHandle = requestAnimationFrame(render);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        cancelAnimationFrame(frameHandle);
        frameHandle = 0;
        return;
      }

      if (!frameHandle) {
        render();
      }
    });

    render();
  </script>
</body>
</html>
